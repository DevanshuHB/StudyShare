<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - StudyShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="antialiased d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top py-3 border-bottom border-secondary-subtle bg-body bg-opacity-75">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <img src="images/logo.png" alt="StudyShare Logo" style="width: 40px; height: 40px;" class="rounded-3 shadow-sm object-fit-cover">
                <span class="h4 mb-0 fw-bold tracking-tight">StudyShare</span>
            </a>

            <div class="d-flex align-items-center d-lg-none gap-2">
                <button class="btn btn-link text-secondary text-decoration-none theme-toggle p-2">
                    <i class="fa-solid fa-moon fs-5"></i>
                </button>
                <button class="navbar-toggler border-0 shadow-none px-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <i class="fa-solid fa-bars fs-3 text-body"></i>
                </button>
            </div>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-lg-4">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="explore.html">Explore Notes</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                </ul>
                <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-3">
                    <button class="btn btn-link text-decoration-none text-body p-2 theme-toggle d-none d-lg-block rounded-circle hover-bg-light transition">
                        <i class="fa-solid fa-moon fs-5"></i>
                    </button>
                    <a href="login.html" class="nav-link fw-medium d-inline-block text-center">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5 px-3 position-relative overflow-hidden" style="margin-top: 80px;">
        <div class="blob bg-primary" style="top: -10%; left: -10%; width: 40%; height: 40%;"></div>
        <div class="blob bg-secondary" style="bottom: -10%; right: -10%; width: 40%; height: 40%;"></div>

        <div class="glass-panel p-4 p-sm-5 w-100 position-relative z-1 shadow-sm" style="max-width: 450px;">
            <div class="text-center mb-4">
                <h2 class="h3 fw-bolder mb-2">Create an account</h2>
                <p class="text-body-secondary small">Join StudyShare and start collaborating.</p>
            </div>
            
            <form action="#" method="POST" onsubmit="handleSignup(event)">
                <div class="mb-3">
                    <label for="name" class="form-label small fw-medium text-body-secondary">Full Name</label>
                    <input type="text" id="name" class="form-control form-control-custom bg-body text-body" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label small fw-medium text-body-secondary">Email address</label>
                    <input type="email" id="email" class="form-control form-control-custom bg-body text-body" placeholder="you@example.com" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label small fw-medium text-body-secondary">Password</label>
                    <input type="password" id="password" class="form-control form-control-custom bg-body text-body" placeholder="••••••••" required>
                </div>
                <div class="mb-4">
                    <label for="confirm-password" class="form-label small fw-medium text-body-secondary">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-control form-control-custom bg-body text-body" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary-gradient w-100 py-2 rounded-3 fw-medium">
                    Create Account
                </button>
            </form>

            <div class="mt-4 pt-4 border-top position-relative text-center">
                <span class="position-absolute top-0 start-50 translate-middle px-3 text-body-secondary small" style="background-color: var(--bs-tertiary-bg, #fff);">Or continue with</span>
                <button class="btn btn-outline-secondary w-100 py-2 rounded-3 fw-medium d-flex align-items-center justify-content-center mt-3 bg-body text-body border">
                    <i class="fa-brands fa-google text-danger me-2"></i> Sign up with Google
                </button>
            </div>

            <p class="mt-4 text-center small text-body-secondary mb-0">
                Already have an account? 
                <a href="login.html" class="fw-medium text-primary text-decoration-none">Login</a>
            </p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>redirectIfLoggedIn();</script>
</body>
</html>
