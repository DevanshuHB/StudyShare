<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StudyShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="antialiased d-flex flex-column min-vh-100">
    
    <!-- Navbar -->
    <nav class="navbar navbar-expand navbar-custom fixed-top py-3 border-bottom border-secondary-subtle bg-body bg-opacity-75">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <img src="images/logo.png" alt="StudyShare Logo" style="width: 40px; height: 40px;" class="rounded-3 shadow-sm object-fit-cover">
                <span class="h4 mb-0 fw-bold tracking-tight">StudyShare</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-link text-decoration-none text-body p-2 theme-toggle rounded-circle hover-bg-light transition">
                    <i class="fa-solid fa-moon fs-5"></i>
                </button>
                <a href="signup.html" class="btn btn-primary-gradient px-4 py-2 rounded-3 fw-medium">Sign Up</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5 px-3 position-relative overflow-hidden" style="margin-top: 80px;">
        <div class="blob bg-primary" style="top: -10%; right: -10%; width: 40%; height: 40%;"></div>

        <div class="glass-panel p-4 p-sm-5 w-100 position-relative z-1 shadow-sm" style="max-width: 450px;">
            <div class="text-center mb-4">
                <h2 class="h3 fw-bolder mb-2">Welcome back</h2>
                <p class="text-body-secondary small">Log in to your account to continue.</p>
            </div>
            
            <form action="#" method="POST" onsubmit="handleLogin(event)">
                <div class="mb-3">
                    <label for="email" class="form-label small fw-medium text-body-secondary">Email address</label>
                    <input type="email" id="email" class="form-control form-control-custom bg-body text-body" placeholder="you@example.com" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label small fw-medium text-body-secondary">Password</label>
                    <input type="password" id="password" class="form-control form-control-custom bg-body text-body" placeholder="••••••••" required>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember-me">
                        <label class="form-check-label small text-body-secondary" for="remember-me">
                            Remember me
                        </label>
                    </div>
                    <a href="#" class="small fw-medium text-primary text-decoration-none hover-primary">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary-gradient w-100 py-2 rounded-3 fw-medium">
                    Login
                </button>
            </form>

            <p class="mt-4 text-center small text-body-secondary mb-0">
                Don't have an account? 
                <a href="signup.html" class="fw-medium text-primary text-decoration-none">Create Account</a>
            </p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>redirectIfLoggedIn();</script>
</body>
</html>
